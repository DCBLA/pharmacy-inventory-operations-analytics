<svg xmlns="http://www.w3.org/2000/svg" width="1220" height="675" viewBox="0 0 1220 675" role="img" aria-labelledby="title desc">
  <title id="title">Trade-offs and final recommendation slide excerpt</title>
  <desc id="desc">Slide-style table showing product-level stockout trade-offs, inventory decisions, service-level implications, and final recommendation.</desc>
  <rect width="1220" height="675" fill="#dbeafe"/>
  <style>
    .navy{fill:#172747}.white{fill:#fff}.head{font:700 34px Arial,sans-serif;fill:#fff}.th{font:700 16px Arial,sans-serif;fill:#fff}.prod{font:700 15px Arial,sans-serif}.txt{font:16px Arial,sans-serif;fill:#3f4856}.strong{font:700 16px Arial,sans-serif}.blue{fill:#3183ff}.green{fill:#6aaa45}.orange{fill:#ff8a00}.line{stroke:#c7d0db;stroke-width:3}.row{fill:#f8fafc}.row2{fill:#ffffff}.note{font:700 20px Arial,sans-serif;fill:#fff}.yellow{fill:#ffcc33}
  </style>
  <rect class="navy" width="1220" height="73"/><text class="head" x="610" y="47" text-anchor="middle">Trade-Offs &amp; Final Recommendation</text>
  <rect x="32" y="86" width="188" height="42" class="navy"/><rect x="224" y="86" width="372" height="42" class="navy"/><rect x="600" y="86" width="322" height="42" class="navy"/><rect x="926" y="86" width="262" height="42" class="navy"/>
  <text class="th" x="126" y="112" text-anchor="middle">Product</text><text class="th" x="410" y="112" text-anchor="middle">Trade-Off</text><text class="th" x="761" y="112" text-anchor="middle">Decision</text><text class="th" x="1057" y="112" text-anchor="middle">Service Level Implication</text>
  <g transform="translate(32 130)">
    <rect class="row" x="0" y="0" width="1156" height="86"/><rect class="row2" x="0" y="86" width="1156" height="86"/><rect class="row" x="0" y="172" width="1156" height="86"/><rect class="row2" x="0" y="258" width="1156" height="86"/><rect class="row" x="0" y="344" width="1156" height="86"/>
    <line class="line" x1="190" y1="0" x2="190" y2="430"/><line class="line" x1="564" y1="0" x2="564" y2="430"/><line class="line" x1="890" y1="0" x2="890" y2="430"/>
    <line class="line" x1="0" y1="86" x2="1156" y2="86"/><line class="line" x1="0" y1="172" x2="1156" y2="172"/><line class="line" x1="0" y1="258" x2="1156" y2="258"/><line class="line" x1="0" y1="344" x2="1156" y2="344"/><line class="line" x1="0" y1="430" x2="1156" y2="430"/>
    <rect x="0" y="0" width="8" height="172" fill="#3183ff"/><rect x="0" y="172" width="8" height="86" fill="#6aaa45"/><rect x="0" y="258" width="8" height="172" fill="#ff8a00"/>
    <text class="prod blue" x="96" y="35" text-anchor="middle">EpiPen</text><text class="prod blue" x="96" y="56" text-anchor="middle">(A-Class)</text>
    <text class="txt" x="376" y="42" text-anchor="middle">Expiry waste vs. fatal stockout risk</text>
    <text class="txt" x="725" y="35" text-anchor="middle">Hold safety stock - accept holding and</text><text class="txt" x="725" y="56" text-anchor="middle">waste costs</text>
    <text class="strong blue" x="1023" y="47" text-anchor="middle">Near zero stockout tolerance</text>
    <text class="prod blue" x="96" y="121" text-anchor="middle">Dapagliflozin</text><text class="prod blue" x="96" y="142" text-anchor="middle">(A-Class)</text>
    <text class="txt" x="376" y="121" text-anchor="middle">Capital tied up (36% of inventory value) vs. daily</text><text class="txt" x="376" y="142" text-anchor="middle">insurance of care</text>
    <text class="txt" x="725" y="121" text-anchor="middle">Continuous review - balance capital</text><text class="txt" x="725" y="142" text-anchor="middle">efficiency with availability</text>
    <text class="strong blue" x="1023" y="133" text-anchor="middle">High daily availability required</text>
    <text class="prod green" x="96" y="207" text-anchor="middle">Mounjaro</text><text class="prod green" x="96" y="228" text-anchor="middle">(B-Class)</text>
    <text class="txt" x="376" y="214" text-anchor="middle">Fridge space vs. uncertain new patients</text>
    <text class="txt" x="725" y="207" text-anchor="middle">Per patient ordering to avoid cold chain</text><text class="txt" x="725" y="228" text-anchor="middle">overcommitment</text>
    <text class="strong green" x="1023" y="219" text-anchor="middle">Short delay sometimes acceptable</text>
    <text class="prod orange" x="96" y="293" text-anchor="middle">Amoxicillin</text><text class="prod orange" x="96" y="314" text-anchor="middle">(C-Class)</text>
    <text class="txt" x="376" y="300" text-anchor="middle">Cheap oversupply vs. October shortage risk</text>
    <text class="txt" x="725" y="293" text-anchor="middle">Seasonal uplift - raise review target stock in</text><text class="txt" x="725" y="314" text-anchor="middle">September</text>
    <text class="strong orange" x="1023" y="305" text-anchor="middle">Avoid seasonal stockouts</text>
    <text class="prod orange" x="96" y="379" text-anchor="middle">Fexofenadine</text><text class="prod orange" x="96" y="400" text-anchor="middle">(C-Class)</text>
    <text class="txt" x="376" y="386" text-anchor="middle">Cheap oversupply vs. May hayfever peak</text>
    <text class="txt" x="725" y="386" text-anchor="middle">Build stock in April ahead of pollen season</text>
    <text class="strong orange" x="1023" y="391" text-anchor="middle">Avoid seasonal owings</text>
  </g>
  <rect class="navy" x="32" y="585" width="1156" height="68"/>
  <text class="note" x="125" y="625" text-anchor="middle"><tspan class="yellow">Final recommendation:</tspan></text>
  <text class="note" x="660" y="614" text-anchor="middle">Prioritise near zero stockout risk for A-items, periodic review for lower value C-items.</text>
  <text class="note" x="660" y="640" text-anchor="middle">Clinical consequence, not cost alone should drive inventory design.</text>
</svg>
