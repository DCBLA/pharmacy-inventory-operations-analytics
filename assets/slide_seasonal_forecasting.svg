    <text class="label" x="240" y="55">Freshers Flu Season</text><path class="arrow" d="M380,12 C345,-20 322,0 318,24"/>
  </g>
  <rect class="navy" x="430" y="214" width="235" height="92"/><text class="metric" x="548" y="252" text-anchor="middle">CV = 0.42</text><text class="subhdr" x="548" y="288" text-anchor="middle">Oct-Dec spike</text>
  <g transform="translate(760 190)">
