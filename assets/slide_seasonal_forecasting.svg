    <text class="label" x="300" y="40">Pollen peaks</text><path class="arrow" d="M248,-6 C290,-28 322,-10 336,10"/>
  </g>
  <rect class="navy" x="1086" y="214" width="240" height="92"/><text class="metric" x="1206" y="252" text-anchor="middle">CV = 0.29</text><text class="subhdr" x="1206" y="288" text-anchor="middle">Mar - Jul Peak</text>
  <rect class="navy" x="560" y="372" width="310" height="58"/><text class="subhdr" x="715" y="409" text-anchor="middle">Holt-Winters needed</text><path class="arrow" d="M520,330 C570,355 585,370 606,392"/><path class="arrow" d="M880,428 C930,444 970,420 982,390"/>
  <g transform="translate(22 440)">
    <rect class="row1" x="0" y="0" width="672" height="47"/><rect class="row2" x="0" y="57" width="672" height="47"/><rect class="row1" x="0" y="114" width="672" height="47"/><rect class="row2" x="0" y="171" width="672" height="47"/><rect class="row1" x="0" y="228" width="672" height="47"/><rect class="row2" x="0" y="285" width="672" height="47"/>
    <g class="orange"><rect x="28" y="8" width="42" height="32"/><rect x="28" y="65" width="42" height="32"/><rect x="28" y="122" width="42" height="32"/><rect x="28" y="179" width="42" height="32"/><rect x="28" y="236" width="42" height="32"/><rect x="28" y="293" width="42" height="32"/></g>
    <g class="white" font-family="Arial" font-weight="700" font-size="22"><text x="49" y="32" text-anchor="middle">P</text><text x="49" y="89" text-anchor="middle">I</text><text x="49" y="146" text-anchor="middle">V</text><text x="49" y="203" text-anchor="middle">A</text><text x="49" y="260" text-anchor="middle">S</text><text x="49" y="317" text-anchor="middle">E</text></g>
    <text class="label" x="86" y="31">Purpose</text><text class="body" x="250" y="31">Prevent stockouts during Oct-Dec infection surge</text>
    <text class="label" x="86" y="88">Information</text><text class="body" x="250" y="88">12 months data + academic calendar</text>
    <text class="label" x="86" y="145">Value</text><text class="body" x="250" y="145">High - missed demand affects treatment and recovery</text>
    <text class="label" x="86" y="202">Analysis</text><text class="body" x="250" y="202">Sep 226 to Oct 945, a 4.2x swing</text>
    <text class="label" x="86" y="259">System</text><text class="body" x="250" y="259">Seasonal model needed for routine pharmacy planning</text>
    <text class="label" x="86" y="316">Evaluation</text><text class="body" x="250" y="316">Avoid Oct stockouts without excess stock</text>
  </g>
  <g transform="translate(708 440)">
    <rect class="row1" x="0" y="0" width="670" height="47"/><rect class="row2" x="0" y="57" width="670" height="47"/><rect class="row1" x="0" y="114" width="670" height="47"/><rect class="row2" x="0" y="171" width="670" height="47"/><rect class="row1" x="0" y="228" width="670" height="47"/><rect class="row2" x="0" y="285" width="670" height="47"/>
    <g class="orange"><rect x="28" y="8" width="42" height="32"/><rect x="28" y="65" width="42" height="32"/><rect x="28" y="122" width="42" height="32"/><rect x="28" y="179" width="42" height="32"/><rect x="28" y="236" width="42" height="32"/><rect x="28" y="293" width="42" height="32"/></g>
    <g class="white" font-family="Arial" font-weight="700" font-size="22"><text x="49" y="32" text-anchor="middle">P</text><text x="49" y="89" text-anchor="middle">I</text><text x="49" y="146" text-anchor="middle">V</text><text x="49" y="203" text-anchor="middle">A</text><text x="49" y="260" text-anchor="middle">S</text><text x="49" y="317" text-anchor="middle">E</text></g>
    <text class="label" x="86" y="31">Purpose</text><text class="body" x="250" y="31">Pre-stock before pollen season</text>
    <text class="label" x="86" y="88">Information</text><text class="body" x="250" y="88">12 months data + pollen calendar</text>
    <text class="label" x="86" y="145">Value</text><text class="body" x="250" y="145">Moderate - stockout inconvenient, less clinically urgent</text>
    <text class="label" x="86" y="202">Analysis</text><text class="body" x="250" y="202">Gradual build to May peak of 1,464 units</text>
    <text class="label" x="86" y="259">System</text><text class="body" x="250" y="259">Seasonal model supports pre-season stock build</text>
    <text class="label" x="86" y="316">Evaluation</text><text class="body" x="250" y="316">Meet peak demand without overstocking</text>
  </g>
  <rect class="navy" x="0" y="720" width="1400" height="40"/><text class="subhdr" x="20" y="748">Sources: Ashley Wong (2025); Hyndman and Athanasopoulos (2018); NHS (2025); Ord et al. (2017)</text>
