<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Seasonal demand forecasting slide excerpt</title>
  <desc id="desc">Slide-style visual showing seasonal demand patterns for Amoxicillin and Fexofenadine and the recommendation to use Holt-Winters forecasting.</desc>
  <rect width="1400" height="760" fill="#dbeafe"/>
  <style>
    .navy{fill:#172747}.orange{fill:#c75016}.cream{fill:#f5eadf}.panel{fill:#fffaf5;stroke:#e46f12;stroke-width:3}.row1{fill:#f8f6f3}.row2{fill:#dcecff}.label{font:700 22px Arial,sans-serif;fill:#c75016}.body{font:21px Arial,sans-serif;fill:#2e3542}.small{font:17px Arial,sans-serif;fill:#555}.tiny{font:14px Arial,sans-serif;fill:#555}.white{fill:#fff}.metric{font:700 33px Arial,sans-serif;fill:#dc5e1c}.hdr{font:700 46px Arial,sans-serif;fill:#fff}.subhdr{font:700 23px Arial,sans-serif;fill:#fff}.axis{stroke:#7a7a7a;stroke-width:2}.arrow{stroke:#df7600;stroke-width:7;fill:none;stroke-linecap:round;marker-end:url(#arrow)}
  </style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#df7600"/></marker></defs>
  <rect class="navy" width="1400" height="92"/><text class="hdr" x="700" y="61" text-anchor="middle">Seasonal Demand Forecasting</text>
  <rect class="orange" x="22" y="92" width="672" height="54"/><rect class="orange" x="696" y="92" width="682" height="54"/>
  <text class="subhdr" x="358" y="128" text-anchor="middle">AMOXICILLIN 500mg</text><text class="subhdr" x="1037" y="128" text-anchor="middle">FEXOFENADINE 120mg</text>
  <rect class="panel" x="22" y="146" width="672" height="246"/><rect class="panel" x="696" y="146" width="682" height="246"/>
  <g transform="translate(70 190)">
    <line class="axis" x1="0" y1="150" x2="315" y2="150"/><line class="axis" x1="0" y1="0" x2="0" y2="150"/>
    <g fill="#ff9a3d"><rect x="18" y="68" width="28" height="82"/><rect x="58" y="35" width="28" height="115"/><rect x="98" y="24" width="28" height="126"/><rect x="138" y="35" width="28" height="115"/><rect x="178" y="88" width="28" height="62"/><rect x="218" y="75" width="28" height="75"/><rect x="258" y="108" width="28" height="42"/><rect x="298" y="100" width="28" height="50"/></g>
