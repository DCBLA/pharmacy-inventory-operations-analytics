    <text class="tiny" x="18" y="170">Jan</text><text class="tiny" x="58" y="170">Feb</text><text class="tiny" x="98" y="170">Mar</text><text class="tiny" x="138" y="170">Apr</text><text class="tiny" x="178" y="170">May</text><text class="tiny" x="218" y="170">Jun</text><text class="tiny" x="258" y="170">Jul</text><text class="tiny" x="298" y="170">Aug</text><text class="tiny" x="338" y="170">Sep</text><text class="tiny" x="378" y="170">Oct</text><text class="tiny" x="418" y="170">Nov</text><text class="tiny" x="458" y="170">Dec</text>
