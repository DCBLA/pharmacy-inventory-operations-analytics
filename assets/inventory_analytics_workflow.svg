<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="280" viewBox="0 0 1100 280" role="img" aria-labelledby="title desc">
  <title id="title">Inventory analytics workflow</title>
  <desc id="desc">Workflow from demand proxy and ABC classification through forecasting, costs, inventory policy, and service level recommendations.</desc>
  <rect width="1100" height="280" fill="#f8fafc"/>
  <style>
    .box { fill: #ffffff; stroke: #b9c5d4; stroke-width: 1.5; rx: 8; }
    .title { font: 700 17px Arial, sans-serif; fill: #142033; }
    .text { font: 14px Arial, sans-serif; fill: #3b485a; }
    .arrow { stroke: #52657c; stroke-width: 2; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#52657c"/>
    </marker>
  </defs>
  <rect class="box" x="35" y="80" width="155" height="110"/>
  <text class="title" x="58" y="118">Demand Proxy</text>
  <text class="text" x="58" y="146">Prescribing data</text>
  <text class="text" x="58" y="168">Local pharmacy case</text>
  <line class="arrow" x1="200" y1="135" x2="235" y2="135"/>
  <rect class="box" x="245" y="80" width="155" height="110"/>
  <text class="title" x="268" y="118">ABC Analysis</text>
  <text class="text" x="268" y="146">Usage value</text>
  <text class="text" x="268" y="168">Pareto priority</text>
  <line class="arrow" x1="410" y1="135" x2="445" y2="135"/>
  <rect class="box" x="455" y="80" width="155" height="110"/>
  <text class="title" x="478" y="118">Forecasting</text>
  <text class="text" x="478" y="146">Holt-Winters</text>
  <text class="text" x="478" y="168">SES by pattern</text>
  <line class="arrow" x1="620" y1="135" x2="655" y2="135"/>
  <rect class="box" x="665" y="80" width="155" height="110"/>
  <text class="title" x="688" y="118">Cost Trade-Off</text>
  <text class="text" x="688" y="146">Holding</text>
  <text class="text" x="688" y="168">Ordering, stockout</text>
  <line class="arrow" x1="830" y1="135" x2="865" y2="135"/>
  <rect class="box" x="875" y="80" width="190" height="110"/>
  <text class="title" x="898" y="118">Policy Design</text>
  <text class="text" x="898" y="146">Continuous review</text>
  <text class="text" x="898" y="168">Periodic review</text>
</svg>
